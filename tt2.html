<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do App</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #141e30, #243b55);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 90%;
    max-width: 500px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 15px;
    color: white;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

/* INPUT */
.input-box {
    display: flex;
    gap: 10px;
}

.input-box input {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    outline: none;
}

.input-box button {
    padding: 10px 15px;
    border: none;
    background: #00f2ff;
    cursor: pointer;
    border-radius: 8px;
    transition: 0.3s;
}

.input-box button:hover {
    background: white;
}

/* TASK LIST */
ul {
    margin-top: 20px;
    list-style: none;
}

li {
    background: rgba(255,255,255,0.15);
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
}

li.completed {
    text-decoration: line-through;
    opacity: 0.6;
}

.task-info {
    display: flex;
    flex-direction: column;
}

small {
    font-size: 12px;
    opacity: 0.7;
}

/* BUTTONS */
.actions button {
    margin-left: 5px;
    border: none;
    padding: 6px 10px;
    cursor: pointer;
    border-radius: 5px;
}

.complete {
    background: #00ff9d;
}

.delete {
    background: #ff4d4d;
}

.actions button:hover {
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">
    <h1>📝 To-Do Web App</h1>

    <div class="input-box">
        <input type="text" id="taskInput" placeholder="Enter your task...">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function renderTasks() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((task, index) => {
        const li = document.createElement("li");

        if (task.completed) li.classList.add("completed");

        li.innerHTML = `
            <div class="task-info">
                <span>${task.text}</span>
                <small>${task.date}</small>
            </div>
            <div class="actions">
                <button class="complete" onclick="toggleTask(${index})">✔</button>
                <button class="delete" onclick="deleteTask(${index})">✖</button>
            </div>
        `;

        list.appendChild(li);
    });
}

function addTask() {
    const input = document.getElementById("taskInput");

    if (input.value.trim() === "") return;

    const newTask = {
        text: input.value,
        date: new Date().toLocaleString(),
        completed: false
    };

    tasks.push(newTask);
    saveTasks();
    renderTasks();

    input.value = "";
}

function toggleTask(index) {
    tasks[index].completed = !tasks[index].completed;
    saveTasks();
    renderTasks();
}

function deleteTask(index) {
    tasks.splice(index, 1);
    saveTasks();
    renderTasks();
}

renderTasks();
</script>

</body>
</html>
